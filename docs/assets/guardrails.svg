<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">codex-loop guardrails</title>
  <desc id="desc">Safety guardrails applied every iteration.</desc>
  <style>
    .bg{fill:#07111f}.card{fill:#101c33;stroke:#29456e;stroke-width:2}.txt{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#edf6ff}.muted{fill:#a8b8d0}.title{font-size:42px;font-weight:800}.h{font-size:24px;font-weight:800}.b{font-size:18px;font-weight:650}.s{font-size:16px}.red{fill:#fb7185}.green{fill:#00d084}.orange{fill:#f59e0b}.cyan{fill:#38bdf8}
  </style>
  <rect class="bg" width="1200" height="520" rx="28"/>
  <text class="txt title" x="48" y="70">Guardrails</text>
  <text class="muted s" x="50" y="100">Safety runs before assign, merge, deploy, or cadence.</text>
  <g transform="translate(60 145)">
    <rect class="card" width="250" height="125" rx="20"/><circle class="red" cx="38" cy="42" r="14"/><text class="txt h" x="65" y="50">PAUSE</text><text class="txt b" x="30" y="92">state=PAUSE halts</text>
    <rect class="card" x="295" width="250" height="125" rx="20"/><circle class="orange" cx="333" cy="42" r="14"/><text class="txt h" x="360" y="50">Park</text><text class="txt b" x="325" y="92">needs:human</text>
    <rect class="card" x="590" width="250" height="125" rx="20"/><circle class="green" cx="628" cy="42" r="14"/><text class="txt h" x="655" y="50">CI green</text><text class="txt b" x="620" y="92">before merge/deploy</text>
    <rect class="card" x="885" width="250" height="125" rx="20"/><circle class="cyan" cx="923" cy="42" r="14"/><text class="txt h" x="950" y="50">Data safe</text><text class="txt b" x="915" y="92">additive migrations</text>
  </g>
  <g transform="translate(205 315)">
    <rect class="card" width="340" height="105" rx="20"/><text class="txt h" x="32" y="44">Claude ships all work</text><text class="muted s" x="32" y="78">Codex never merges or deploys.</text>
    <rect class="card" x="450" width="340" height="105" rx="20"/><text class="txt h" x="482" y="44">No silent risk</text><text class="muted s" x="482" y="78">money, legal, destructive, ambiguous = park</text>
  </g>
</svg>
