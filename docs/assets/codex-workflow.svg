<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Claude and Codex workflow</title>
  <desc id="desc">How Claude and Codex split work in codex-loop.</desc>
  <style>
    .bg{fill:#07111f}.card{fill:#101c33;stroke:#29456e;stroke-width:2}.hub{fill:#13213d;stroke:#00d084;stroke-width:3}.txt{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#edf6ff}.muted{fill:#a8b8d0}.title{font-size:42px;font-weight:800}.h{font-size:25px;font-weight:800}.b{font-size:19px;font-weight:650}.s{font-size:16px}.arrow{stroke:#38bdf8;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.orange{stroke:#f59e0b}.green{stroke:#00d084}.pill{fill:#172342;stroke:#375072;stroke-width:1.5}
  </style>
  <rect class="bg" width="1200" height="560" rx="28"/>
  <text class="txt title" x="48" y="70">How work is managed</text>
  <text class="muted s" x="50" y="100">Claude implements its own lane and gates everything Codex returns.</text>
  <rect class="card" x="60" y="150" width="275" height="280" rx="22"/>
  <text class="txt h" x="90" y="195">Claude</text>
  <text class="txt b" x="90" y="240">orchestrates</text>
  <text class="txt b" x="90" y="280">implements agent:claude</text>
  <text class="txt b" x="90" y="320">verifies all work</text>
  <text class="txt b" x="90" y="360">merges + deploys</text>
  <rect class="hub" x="430" y="138" width="340" height="305" rx="26"/>
  <text class="txt h" x="496" y="182">GitHub issues</text>
  <rect class="pill" x="482" y="218" width="236" height="42" rx="21"/><text class="txt b" x="510" y="245">agent:claude</text>
  <rect class="pill" x="482" y="278" width="236" height="42" rx="21"/><text class="txt b" x="510" y="305">agent:codex</text>
  <rect class="pill" x="482" y="338" width="236" height="42" rx="21"/><text class="txt b" x="510" y="365">contract=frozen</text>
  <text class="muted s" x="490" y="414">labels + LOOP comments</text>
  <rect class="card" x="865" y="150" width="275" height="280" rx="22"/>
  <text class="txt h" x="895" y="195">Codex</text>
  <text class="txt b" x="895" y="240">implements agent:codex</text>
  <text class="txt b" x="895" y="280">local worktree or cloud PR</text>
  <text class="txt b" x="895" y="320">never merges</text>
  <text class="txt b" x="895" y="360">never deploys</text>
  <path class="arrow green" d="M338 250h78l-22-22M416 250l-22 22"/>
  <text class="txt s" x="348" y="230">direct lane</text>
  <path class="arrow orange" d="M772 300h78l-22-22M850 300l-22 22"/>
  <text class="txt s" x="780" y="280">worker lane</text>
  <path class="arrow" d="M865 390C720 515 480 515 335 390"/>
  <text class="muted s" x="498" y="505">Codex returns work - Claude verifies, merges, deploys.</text>
</svg>
